---
name: update available modules

on:
  repository_dispatch:
    types: [update-modules]
  workflow_dispatch:

jobs:
  stub:
    runs-on: ubuntu-latest
    steps:
      - name: Print payload
        run: |
          echo "received this payload: ${{ toJSON(github.event.client_payload.modules) }}"

      - name: checkout repo
        uses: actions/checkout@v6

      - name: make modules table
        env:
          MODULES_JSON: ${{ toJSON(github.event.client_payload.modules) }}
        run: |
          cd "$GITHUB_WORKSPACE/assets/util"
          echo "$MODULES_JSON" > out.json
          chmod +x ./make_packages_md.sh
          ./make_packages_md.sh < out.json > modules.md
          touch packages.md
          chmod +rw packages.md
          cat package_stub.md > packages.md 
          cat modules.md >> packages.md 
          rm "$GITHUB_WORKSPACE/docs/software/packages.md"
          mv packages.md "$GITHUB_WORKSPACE/docs/software/"
          git config --local user.email "action@racs.com"
          git config --local user.name "Automatic runner"
          git add "$GITHUB_WORKSPACE/docs/software/"
          git commit -m "Automatically triggered by lmod repo push, refresh of packages.md"
          git push

      
